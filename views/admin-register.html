<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Register | CommunityReport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body class="auth-body">

<div class="auth-wrapper">
  <div class="auth-card card shadow-lg p-4">
    <div class="text-center mb-4">
      <div class="auth-icon bg-danger text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width:60px;height:60px;font-size:1.8rem;">
        <i class="bi bi-shield-plus"></i>
      </div>
      <h3 class="fw-bold">Admin Registration</h3>
      <p class="text-muted">Register as an authority/department admin</p>
    </div>

    <div id="alertBox" class="d-none"></div>

    <form id="adminRegisterForm">
      <div class="mb-3">
        <label class="form-label fw-semibold">Full Name</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" id="name" class="form-control" placeholder="Enter full name" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email Address</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input type="email" id="email" class="form-control" placeholder="Enter admin email" required/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Department</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-building"></i></span>
          <select id="department" class="form-select" required>
            <option value="">Select Department</option>
            <option value="Sanitation">Sanitation</option>
            <option value="Water Supply">Water Supply</option>
            <option value="Roads & Infrastructure">Roads & Infrastructure</option>
            <option value="Electricity">Electricity</option>
            <option value="Drainage">Drainage</option>
            <option value="General">General</option>
          </select>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required/>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Confirm Password</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm password" required/>
        </div>
      </div>
      <button type="submit" class="btn btn-danger w-100 fw-bold py-2" id="submitBtn">
        <span id="btnText">Register Admin</span>
        <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2"></span>
      </button>
    </form>

    <p class="text-center mt-3 mb-0">
      Already registered? <a href="/admin-login" class="text-danger fw-semibold">Login here</a>
    </p>
    <p class="text-center mt-1 mb-0">
      <a href="/" class="text-muted small"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
    </p>
  </div>
</div>

<script src="/admin.js"></script>
</body>
</html>
