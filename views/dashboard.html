<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Dashboard | CommunityReport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-shield-fill me-2"></i>Admin Panel</a>
    <div class="ms-auto d-flex gap-2 align-items-center">
      <span class="text-white small me-2">Admin: <span id="adminName">Admin</span></span>
      <button onclick="logout()" class="btn btn-light btn-sm text-danger fw-bold">Logout</button>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-4">

  <!-- Stats Cards -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <div class="fs-2 text-primary fw-bold" id="totalCount">0</div>
        <div class="text-muted small">Total Complaints</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <div class="fs-2 text-warning fw-bold" id="pendingCount">0</div>
        <div class="text-muted small">Pending</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <div class="fs-2 text-info fw-bold" id="inProgressCount">0</div>
        <div class="text-muted small">In Progress</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="card border-0 shadow-sm text-center p-3 stat-card">
        <div class="fs-2 text-success fw-bold" id="resolvedCount">0</div>
        <div class="text-muted small">Resolved</div>
      </div>
    </div>
  </div>

  <!-- Filters -->
  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body d-flex flex-wrap gap-3 align-items-center">
      <h6 class="mb-0 fw-bold me-2"><i class="bi bi-funnel me-1"></i>Filter:</h6>
      <select id="filterStatus" class="form-select form-select-sm" style="width:auto" onchange="loadComplaints()">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
        <option value="Rejected">Rejected</option>
      </select>
      <select id="filterCategory" class="form-select form-select-sm" style="width:auto" onchange="loadComplaints()">
        <option value="">All Categories</option>
        <option value="Garbage Overflow">Garbage Overflow</option>
        <option value="Water Leakage">Water Leakage</option>
        <option value="Pothole">Pothole</option>
        <option value="Streetlight Failure">Streetlight Failure</option>
        <option value="Drainage Issue">Drainage Issue</option>
        <option value="Other">Other</option>
      </select>
      <select id="filterPriority" class="form-select form-select-sm" style="width:auto" onchange="loadComplaints()">
        <option value="">All Priority</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <button onclick="loadComplaints()" class="btn btn-sm btn-primary ms-auto">
        <i class="bi bi-arrow-clockwise me-1"></i>Refresh
      </button>
    </div>
  </div>

  <!-- Complaints Table -->
  <div class="card border-0 shadow-sm">
    <div class="card-header bg-white fw-bold py-3">
      <i class="bi bi-table me-2 text-danger"></i>All Complaints
    </div>
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="table-light">
            <tr>
              <th>ID</th>
              <th>Title</th>
              <th>Category</th>
              <th>Location</th>
              <th>Priority</th>
              <th>Status</th>
              <th>Submitted By</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="complaintsTable">
            <tr><td colspan="9" class="text-center py-4">
              <div class="spinner-border text-danger"></div>
              <p class="mt-2 text-muted">Loading...</p>
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Update Modal -->
<div class="modal fade" id="updateModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title fw-bold"><i class="bi bi-pencil me-2"></i>Update Complaint</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="updateComplaintId"/>
        <div class="mb-3">
          <label class="form-label fw-semibold">Update Status</label>
          <select id="updateStatus" class="form-select">
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Resolved">Resolved</option>
            <option value="Rejected">Rejected</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Remarks</label>
          <textarea id="updateRemarks" class="form-control" rows="3" placeholder="Add remarks or notes..."></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger fw-bold" onclick="updateComplaint()">Update</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/admin.js"></script>
<!-- View Complaint Modal -->
<div class="modal fade" id="viewModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title fw-bold">
          <i class="bi bi-eye me-2"></i>Complaint Details & Photos
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="viewComplaintBody">
        Loading...
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
