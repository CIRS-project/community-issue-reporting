<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Track Complaints | CommunityReport</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/style.css"/>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/"><i class="bi bi-geo-alt-fill me-2"></i>CommunityReport</a>
    <div class="ms-auto d-flex gap-2 align-items-center">
      <span class="text-white small me-2">Welcome, <span id="userName">Resident</span></span>
      <a href="/complaint" class="btn btn-outline-light btn-sm">New Complaint</a>
      <button onclick="logout()" class="btn btn-light btn-sm text-danger fw-bold">Logout</button>
    </div>
  </div>
</nav>

<div class="container my-5">

  <!-- Search by Complaint ID -->
  <div class="row justify-content-center mb-4">
    <div class="col-lg-8">
      <div class="card border-0 shadow-sm p-4">
        <h5 class="fw-bold mb-3"><i class="bi bi-search me-2 text-primary"></i>Track by Complaint ID</h5>
        <div class="input-group">
          <input type="text" id="trackId" class="form-control" placeholder="Enter Complaint ID e.g. CMP0001"/>
          <button class="btn btn-primary" onclick="trackComplaint()">Track</button>
        </div>
        <div id="trackResult" class="mt-3"></div>
      </div>
    </div>
  </div>

  <!-- My Complaints List -->
  <div class="row justify-content-center">
    <div class="col-lg-10">
      <div class="card border-0 shadow-sm">
        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
          <h5 class="mb-0 fw-bold"><i class="bi bi-list-ul me-2 text-primary"></i>My Complaints</h5>
          <span id="totalCount" class="badge bg-primary rounded-pill">0</span>
        </div>
        <div class="card-body p-0">
          <div id="complaintsList" class="p-4">
            <div class="text-center py-4">
              <div class="spinner-border text-primary"></div>
              <p class="mt-2 text-muted">Loading complaints...</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/resident.js"></script>
</body>
</html>
